<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/chatui.css">
  <title>Chat</title>
</head>
<body>

  <div id="chat-container">

    <div id="chat-header">
      <h2>Rahul (Online)</h2>
    </div>

    <div id="chat-message-area">

      <div class="receive">
        Hi, how are you?
        <span>12:00</span>
      </div>

      <div class="sent">
        yeah! i am good...
        <span>12:01</span>
      </div>

    </div>

    <div id="chat-input-area">
      <input type="text" placeholder="Enter your message" id="input-msg">
      <button id="send-btn">Send</button>
    </div>
  </div>
  
  <script src="./js/chatui.js"></script>
</body>
</html>
